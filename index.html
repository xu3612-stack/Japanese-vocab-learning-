<html lang="zh-CN">
<head>

    <style>
        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #18202a;
            --muted: #5f6b7a;
            --line: #d9dfeb;
            --accent: #1f6feb;
            --accent-2: #0d9488;
            --danger: #b42318;
            --shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
            --radius: 20px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
        }
        .title {
            font-size: 30px;
            font-weight: 800;
            margin: 8px 0 6px;
        }
        .subtitle {
            color: var(--muted);
            margin-bottom: 22px;
            line-height: 1.6;
        }
        .grid {
            display: grid;
            grid-template-columns: 1.4fr 0.9fr;
            gap: 20px;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px;
            border: 1px solid #eef1f6;
        }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            background: #e8f0ff;
            color: var(--accent);
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 8px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .bar {
            width: 100%;
            height: 10px;
            background: #edf2f7;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 22px;
        }
        .bar > div {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            transition: width .25s ease;
        }
        .word {
            font-size: 44px;
            font-weight: 800;
            margin: 8px 0 8px;
            letter-spacing: .5px;
        }
        .kana {
            font-size: 22px;
            color: #344054;
            margin-bottom: 10px;
        }
        .meta {
            display: inline-block;
            padding: 5px 10px;
            background: #f2f4f7;
            border-radius: 999px;
            font-size: 13px;
            color: #344054;
            margin-bottom: 18px;
        }
        .meaning-box, .example-box {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 16px;
            margin-top: 14px;
            background: #fbfcfe;
        }
        .label {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 700;
        }
        .meaning {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.5;
        }
        .example-ja {
            font-size: 18px;
            margin-bottom: 8px;
        }
        .example-zh {
            color: var(--muted);
            line-height: 1.6;
        }
        .hidden-state {
            color: #98a2b3;
            font-size: 16px;
            font-style: italic;
        }
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        button, select {
            border: none;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 700;
        }
        button {
            cursor: pointer;
            transition: transform .04s ease, opacity .2s ease;
        }
        button:active { transform: translateY(1px); }
        select {
            background: #f2f4f7;
            color: #344054;
            border: 1px solid #d0d5dd;
            width: 100%;
        }
        .primary { background: var(--accent); color: white; }
        .secondary { background: #eef2ff; color: #243b53; }
        .success { background: #e7f8f2; color: #087443; }
        .warn { background: #fff2e8; color: #b54708; }
        .ghost { background: #f2f4f7; color: #344054; }
        .danger { background: #fee4e2; color: var(--danger); }
        .panel-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 14px;
        }
        .setting {
            margin-bottom: 16px;
        }
        .setting label {
            display: block;
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 700;
        }
        input[type="range"] { width: 100%; }
        .kv {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #344054;
        }
        .review-list {
            margin: 0;
            padding-left: 18px;
            max-height: 180px;
            overflow: auto;
            color: #344054;
        }
        .small, .footer-note, .status {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }
        .status {
            margin-top: 12px;
            min-height: 22px;
            font-size: 14px;
        }
        @media (max-width: 760px) {
            .grid { grid-template-columns: 1fr; }
            .word { font-size: 34px; }
            .kana { font-size: 19px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="title">日语词汇播放器</div>
        <div class="subtitle">
            当前为 <strong>模式 B</strong>：先播放日语单词，延迟后再显示中文并<strong>自动朗读例句</strong>。<br>
            点击“停止”后会停留在当前单词；下次打开时会自动回到上次停下的位置。
        </div>

        <div class="grid">
            <section class="card">
                <div class="badge">模式 B · 强化记忆</div>

                <div class="setting" style="margin-bottom:18px;">
                    <label for="lessonSelect">目录 / Lesson</label>
                    <select id="lessonSelect"></select>
                </div>

                <div class="progress">
                    <div id="progressText">Lesson 26 : 1 / 0</div>
                    <div id="reviewCount">不会词：0</div>
                </div>

                <div class="bar"><div id="progressBar"></div></div>

                <div id="word" class="word">加载中...</div>
                <div id="kana" class="kana">...</div>
                <div id="pos" class="meta">...</div>

                <div class="meaning-box">
                    <div class="label">中文解释</div>
                    <div id="meaning" class="hidden-state">尚未显示。请先听发音并自己回忆。</div>
                </div>

                <div class="example-box">
                    <div class="label">例句</div>
                    <div id="exampleJa" class="example-ja">—</div>
                    <div id="exampleZh" class="example-zh">—</div>
                </div>

                <div class="controls">
                    <button class="primary" id="playBtn">播放单词</button>
                    <button class="secondary" id="showBtn">显示中文/听例句</button>
                    <button class="ghost" id="nextBtn">下一个</button>
                    <button class="warn" id="unknownBtn">标记不会</button>
                    <button class="success" id="autoBtn">开始自动模式</button>
                    <button class="danger" id="stopBtn">停止</button>
                </div>

                <div id="status" class="status"></div>
            </section>

            <aside class="card">
                <div class="panel-title">设置</div>

                <div class="setting">
                    <label for="delayRange">中文显示延迟</label>
                    <div class="kv"><span>等待你回忆词义</span><strong id="delayValue">2.0 秒</strong></div>
                    <input id="delayRange" type="range" min="1" max="5" step="0.5" value="2" />
                </div>

                <div class="setting">
                    <label for="speedRange">朗读速度</label>
                    <div class="kv"><span>语速控制</span><strong id="speedValue">0.9</strong></div>
                    <input id="speedRange" type="range" min="0.6" max="1.2" step="0.1" value="0.9" />
                </div>

                <div class="setting">
                    <label for="autonextRange">自动模式：切换间隔</label>
                    <div class="kv"><span>听完例句后等待</span><strong id="autonextValue">1.5 秒</strong></div>
                    <input id="autonextRange" type="range" min="1" max="4" step="0.5" value="1.5" />
                </div>

                <div class="panel-title" style="margin-top:22px;">不会词列表</div>
                <ol id="reviewList" class="review-list"></ol>
                <div class="small" id="reviewHint">当前还没有标记不会的词。</div>
            </aside>
        </div>
    </div>

    "kana": "じぶん",
    "pos": "名词/代词",
    "meaning_zh": "自己",
    "example_ja": "自分で選びました。",
    "example_zh": "我自己选的。",
    "audio_text": "じぶん"
  },
  {
    "lesson": 28,
    "word": "色",
    "kana": "いろ",
    "pos": "名词",
    "meaning_zh": "颜色",
    "example_ja": "私は青い色が好きです。",
    "example_zh": "我喜欢蓝色。",
    "audio_text": "いろ"
  },
  {
    "lesson": 28,
    "word": "誘う",
    "kana": "さそう",
    "pos": "动词",
    "meaning_zh": "邀请；约",
    "example_ja": "友達をイベントに誘いました。",
    "example_zh": "我邀请朋友参加活动。",
    "audio_text": "さそう"
  },
  {
    "lesson": 28,
    "word": "踊る",
    "kana": "おどる",
    "pos": "动词",
    "meaning_zh": "跳舞",
    "example_ja": "音楽を聞きながら踊ります。",
    "example_zh": "一边听音乐一边跳舞。",
    "audio_text": "おどる"
  },
  {
    "lesson": 28,
    "word": "通う",
    "kana": "かよう",
    "pos": "动词",
    "meaning_zh": "往返；通（学/勤）",
    "example_ja": "毎日日本語学校に通っています。",
    "example_zh": "每天去日语学校上学。",
    "audio_text": "かよう"
  },
  {
    "lesson": 28,
    "word": "選ぶ",
    "kana": "えらぶ",
    "pos": "动词",
    "meaning_zh": "选择",
    "example_ja": "自分で好きな品物を選びます。",
    "example_zh": "自己选择喜欢的商品。",
    "audio_text": "えらぶ"
  }
]
        };

        // =========================
        // 2. 本地存储 key
        // =========================
        const STORAGE_KEYS = {
            lastLesson: "jp_vocab_last_lesson",
            progressPrefix: "jp_vocab_progress_",
            reviewPrefix: "jp_vocab_review_"
        };

        // =========================
        // 3. 状态变量
        // =========================
        let currentLesson = localStorage.getItem(STORAGE_KEYS.lastLesson) || "Lesson 26";
        let vocab = allLessons[currentLesson] || [];
        let index = 0;
        let autoMode = false;
        let timers = [];
        let reviewSet = new Set();

        // =========================
        // 4. DOM
        // =========================
        const els = {
            word: document.getElementById("word"),
            kana: document.getElementById("kana"),
            pos: document.getElementById("pos"),
            meaning: document.getElementById("meaning"),
            exampleJa: document.getElementById("exampleJa"),
            exampleZh: document.getElementById("exampleZh"),
            progressText: document.getElementById("progressText"),
            progressBar: document.getElementById("progressBar"),
            reviewCount: document.getElementById("reviewCount"),
            reviewList: document.getElementById("reviewList"),
            reviewHint: document.getElementById("reviewHint"),
            delayRange: document.getElementById("delayRange"),
            delayValue: document.getElementById("delayValue"),
            speedRange: document.getElementById("speedRange"),
            speedValue: document.getElementById("speedValue"),
            autonextRange: document.getElementById("autonextRange"),
            autonextValue: document.getElementById("autonextValue"),
            status: document.getElementById("status"),
            autoBtn: document.getElementById("autoBtn"),
            lessonSelect: document.getElementById("lessonSelect")
        };

        // =========================
        // 5. 工具函数
        // =========================
        function getProgressKey(lessonName) {
            return `${STORAGE_KEYS.progressPrefix}${lessonName}`;
        }

        function getReviewKey(lessonName) {
            return `${STORAGE_KEYS.reviewPrefix}${lessonName}`;
        }

        function loadSavedIndex(lessonName) {
            const raw = localStorage.getItem(getProgressKey(lessonName));
            if (raw === null) return 0;
            const parsed = parseInt(raw, 10);
            return Number.isNaN(parsed) ? 0 : parsed;
        }

        function saveProgress() {
            localStorage.setItem(getProgressKey(currentLesson), String(index));
            localStorage.setItem(STORAGE_KEYS.lastLesson, currentLesson);
        }

        function loadReviewSet(lessonName) {
            const raw = localStorage.getItem(getReviewKey(lessonName));
            if (!raw) return new Set();
            try {
                const arr = JSON.parse(raw);
                return new Set(Array.isArray(arr) ? arr : []);
            } catch {
                return new Set();
            }
        }

        function saveReviewSet() {
            localStorage.setItem(getReviewKey(currentLesson), JSON.stringify([...reviewSet]));
        }

        function clearTimers() {
            timers.forEach(t => clearTimeout(t));
            timers = [];
        }

        function setStatus(text) {
            els.status.textContent = text || "";
        }

        function stopSpeech() {
            speechSynthesis.cancel();
        }

        function stopAll() {
            stopSpeech();
            clearTimers();
            autoMode = false;
            els.autoBtn.textContent = "开始自动模式";
            saveProgress();
            saveReviewSet();
            setStatus(`已停止。当前位置已保存：${currentLesson} 第 ${index + 1} 个词`);
        }

        function initLessonMenu() {
            els.lessonSelect.innerHTML = "";
            Object.keys(allLessons).forEach(lessonName => {
                const opt = document.createElement("option");
                opt.value = lessonName;
                opt.textContent = lessonName;
                if (lessonName === currentLesson) opt.selected = true;
                els.lessonSelect.appendChild(opt);
            });
        }

        function refreshReview() {
            els.reviewCount.textContent = `不会词：${reviewSet.size}`;
            els.reviewList.innerHTML = "";
            if (reviewSet.size === 0) {
                els.reviewHint.style.display = "block";
                return;
            }
            els.reviewHint.style.display = "none";
            [...reviewSet].forEach(word => {
                const li = document.createElement("li");
                li.textContent = word;
                els.reviewList.appendChild(li);
            });
        }

        function safeIndex() {
            if (!Array.isArray(vocab) || vocab.length === 0) {
                index = 0;
                return;
            }
            if (index < 0) index = 0;
            if (index >= vocab.length) index = 0;
        }

        function updateDisplay() {
            safeIndex();

            if (!Array.isArray(vocab) || vocab.length === 0) {
                els.word.textContent = "暂无词汇";
                els.kana.textContent = "—";
                els.pos.textContent = "—";
                els.meaning.textContent = "当前课程没有内容。";
                els.meaning.className = "hidden-state";
                els.exampleJa.textContent = "—";
                els.exampleZh.textContent = "—";
                els.progressText.textContent = `${currentLesson} : 0 / 0`;
                els.progressBar.style.width = "0%";
                refreshReview();
                return;
            }

            const item = vocab[index];
            els.word.textContent = item.word || "—";
            els.kana.textContent = item.kana || "—";
            els.pos.textContent = item.pos || "—";
            els.meaning.textContent = "尚未显示。请先听发音并自己回忆。";
            els.meaning.className = "hidden-state";
            els.exampleJa.textContent = item.example_ja || "—";
            els.exampleZh.textContent = item.example_zh || "—";
            els.progressText.textContent = `${currentLesson} : ${index + 1} / ${vocab.length}`;
            els.progressBar.style.width = `${((index + 1) / vocab.length) * 100}%`;

            saveProgress();
            refreshReview();
        }

        function revealMeaning() {
            if (!vocab.length) return;

            const item = vocab[index];
            els.meaning.textContent = item.meaning_zh || "—";
            els.meaning.className = "meaning";
            setStatus("中文解释已显示。");

            if (item.example_ja && item.example_ja !== "—") {
                const exampleUtter = new SpeechSynthesisUtterance(item.example_ja);
                exampleUtter.lang = "ja-JP";
                exampleUtter.rate = parseFloat(els.speedRange.value);

                const timer = setTimeout(() => {
                    stopSpeech();
                    speechSynthesis.speak(exampleUtter);
                    setStatus(`正在朗读例句：${item.example_ja}`);
                }, 300);

                timers.push(timer);
            }
        }

        function speakCurrent() {
            if (!vocab.length) return;

            const item = vocab[index];
            stopSpeech();

            const utter = new SpeechSynthesisUtterance(item.audio_text || item.kana || item.word);
            utter.lang = "ja-JP";
            utter.rate = parseFloat(els.speedRange.value);
            utter.onstart = () => setStatus(`正在朗读单词：${item.audio_text || item.kana || item.word}`);
            utter.onend = () => setStatus("单词朗读完成。请回忆中文。");
            utter.onerror = () => setStatus("朗读失败。请检查浏览器是否支持日语语音。");

            speechSynthesis.speak(utter);
            saveProgress();
        }

        function nextWord() {
            if (!vocab.length) return;

            stopSpeech();
            clearTimers();

            index = (index + 1) % vocab.length;
            saveProgress();
            updateDisplay();

            if (autoMode) {
                runAutoCycle();
            } else {
                setStatus(`已切换到下一个词。当前位置已保存：${index + 1}`);
            }
        }

        function markUnknown() {
            if (!vocab.length) return;

            reviewSet.add(vocab[index].word);
            saveReviewSet();
            refreshReview();
            setStatus(`已标记不会：${vocab[index].word}`);
        }

        function changeLesson(newLesson) {
            stopAll();

            currentLesson = newLesson;
            vocab = allLessons[currentLesson] || [];
            index = loadSavedIndex(currentLesson);
            reviewSet = loadReviewSet(currentLesson);

            safeIndex();
            saveProgress();
            updateDisplay();

            setStatus(`已切换到 ${currentLesson}。恢复到上次进度：第 ${index + 1} 个词`);
        }

        function runAutoCycle() {
            if (!vocab.length) return;

            clearTimers();
            updateDisplay();
            speakCurrent();

            const delayMs = parseFloat(els.delayRange.value) * 1000;
            const nextMs = parseFloat(els.autonextRange.value) * 1000;

            timers.push(setTimeout(() => {
                revealMeaning();
            }, delayMs));

            timers.push(setTimeout(() => {
                index = (index + 1) % vocab.length;
                saveProgress();
                runAutoCycle();
            }, delayMs + nextMs + 1200));
        }

        // =========================
        // 6. 事件绑定
        // =========================
        document.getElementById("playBtn").addEventListener("click", () => {
            stopSpeech();
            speakCurrent();
        });

        document.getElementById("showBtn").addEventListener("click", () => {
            clearTimers();
            revealMeaning();
            saveProgress();
        });

        document.getElementById("nextBtn").addEventListener("click", nextWord);
        document.getElementById("unknownBtn").addEventListener("click", markUnknown);
        document.getElementById("stopBtn").addEventListener("click", stopAll);

        els.autoBtn.addEventListener("click", () => {
            autoMode = !autoMode;
            if (autoMode) {
                els.autoBtn.textContent = "自动模式运行中...";
                runAutoCycle();
            } else {
                stopAll();
            }
        });

        els.lessonSelect.addEventListener("change", (e) => {
            changeLesson(e.target.value);
        });

        els.delayRange.addEventListener("input", () => {
            els.delayValue.textContent = `${parseFloat(els.delayRange.value).toFixed(1)} 秒`;
        });

        els.speedRange.addEventListener("input", () => {
            els.speedValue.textContent = `${parseFloat(els.speedRange.value).toFixed(1)}`;
        });

        els.autonextRange.addEventListener("input", () => {
            els.autonextValue.textContent = `${parseFloat(els.autonextRange.value).toFixed(1)} 秒`;
        });

        // =========================
        // 7. 初始化
        // =========================
        if (!allLessons[currentLesson]) {
            currentLesson = "Lesson 26";
        }

        vocab = allLessons[currentLesson] || [];
        index = loadSavedIndex(currentLesson);
        reviewSet = loadReviewSet(currentLesson);

        safeIndex();
        initLessonMenu();
        updateDisplay();

        els.delayValue.textContent = `${parseFloat(els.delayRange.value).toFixed(1)} 秒`;
        els.speedValue.textContent = `${parseFloat(els.speedRange.value).toFixed(1)}`;
        els.autonextValue.textContent = `${parseFloat(els.autonextRange.value).toFixed(1)} 秒`;

        setStatus(`已恢复 ${currentLesson} 的进度：第 ${index + 1} 个词`);
    </script>
</body>
</html>
