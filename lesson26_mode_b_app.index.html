    let index = 0, autoMode = false, timers = [];
    const reviewSet = new Set();
    const els = {
      word: document.getElementById("word"), kana: document.getElementById("kana"), pos: document.getElementById("pos"),
      meaning: document.getElementById("meaning"), exampleJa: document.getElementById("exampleJa"), exampleZh: document.getElementById("exampleZh"),
      progressText: document.getElementById("progressText"), progressBar: document.getElementById("progressBar"),
      reviewCount: document.getElementById("reviewCount"), reviewList: document.getElementById("reviewList"), reviewHint: document.getElementById("reviewHint"),
      delayRange: document.getElementById("delayRange"), delayValue: document.getElementById("delayValue"),
      speedRange: document.getElementById("speedRange"), speedValue: document.getElementById("speedValue"),
      autonextRange: document.getElementById("autonextRange"), autonextValue: document.getElementById("autonextValue"),
      status: document.getElementById("status"), autoBtn: document.getElementById("autoBtn")
    };

    function clearTimers() { timers.forEach(t => clearTimeout(t)); timers = []; }
    function setStatus(text) { els.status.textContent = text || ""; }
    function refreshReview() {
      els.reviewCount.textContent = `不会词：${reviewSet.size}`;
      els.reviewList.innerHTML = "";
      if (reviewSet.size === 0) { els.reviewHint.style.display = "block"; return; }
      els.reviewHint.style.display = "none";
      [...reviewSet].forEach(word => { const li = document.createElement("li"); li.textContent = word; els.reviewList.appendChild(li); });
    }
    function updateDisplay() {
      const item = vocab[index];
      els.word.textContent = item.word; els.kana.textContent = item.kana; els.pos.textContent = item.pos;
      els.meaning.textContent = "尚未显示。请先听发音并自己回忆。"; els.meaning.className = "hidden-state";
      els.exampleJa.textContent = item.example_ja || "—"; els.exampleZh.textContent = item.example_zh || "—";
      els.progressText.textContent = `${index + 1} / ${vocab.length}`;
      els.progressBar.style.width = `${((index + 1) / vocab.length) * 100}%`;
      refreshReview();
    }
    function revealMeaning() {
      const item = vocab[index];
      els.meaning.textContent = item.meaning_zh; els.meaning.className = "meaning"; setStatus("中文解释已显示。");
    }
    function speakCurrent() {
      const item = vocab[index];
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(item.audio_text);
      utter.lang = "ja-JP"; utter.rate = parseFloat(els.speedRange.value); utter.pitch = 1; utter.volume = 1;
      utter.onstart = () => setStatus(`正在朗读：${item.audio_text}`);
      utter.onerror = () => setStatus("朗读失败。请检查浏览器是否支持日语语音。");
      utter.onend = () => setStatus("朗读完成。现在请先自己回忆中文。");
      speechSynthesis.speak(utter);
    }
    function stopAll() {
      speechSynthesis.cancel(); clearTimers(); autoMode = false; els.autoBtn.textContent = "开始自动模式"; setStatus("已停止朗读。");
    }
    function nextWord() {
      clearTimers(); index = (index + 1) % vocab.length; updateDisplay();
      if (autoMode) runAutoCycle(); else setStatus("已切换到下一个词。");
    }
    function markUnknown() { reviewSet.add(vocab[index].word); refreshReview(); setStatus(`已标记不会：${vocab[index].word}`); }
    function runAutoCycle() {
      clearTimers(); updateDisplay(); speakCurrent();
      const delayMs = parseFloat(els.delayRange.value) * 1000;
      const nextMs = parseFloat(els.autonextRange.value) * 1000;
      timers.push(setTimeout(revealMeaning, delayMs));
      timers.push(setTimeout(() => { index = (index + 1) % vocab.length; runAutoCycle(); }, delayMs + nextMs));
    }

    document.getElementById("playBtn").addEventListener("click", speakCurrent);
    document.getElementById("showBtn").addEventListener("click", revealMeaning);
    document.getElementById("nextBtn").addEventListener("click", nextWord);
    document.getElementById("unknownBtn").addEventListener("click", markUnknown);
    document.getElementById("stopBtn").addEventListener("click", stopAll);
    els.autoBtn.addEventListener("click", () => {
      autoMode = !autoMode;
      if (autoMode) { els.autoBtn.textContent = "自动模式进行中"; runAutoCycle(); }
      else stopAll();
    });
    els.delayRange.addEventListener("input", () => els.delayValue.textContent = `${parseFloat(els.delayRange.value).toFixed(1)} 秒`);
    els.speedRange.addEventListener("input", () => els.speedValue.textContent = `${parseFloat(els.speedRange.value).toFixed(1)}`);
    els.autonextRange.addEventListener("input", () => els.autonextValue.textContent = `${parseFloat(els.autonextRange.value).toFixed(1)} 秒`);

    updateDisplay();
    els.delayValue.textContent = `${parseFloat(els.delayRange.value).toFixed(1)} 秒`;
    els.speedValue.textContent = `${parseFloat(els.speedRange.value).toFixed(1)}`;
    els.autonextValue.textContent = `${parseFloat(els.autonextRange.value).toFixed(1)} 秒`;
  </script>
